[advisories]
yanked = "deny"
ignore = [
    # Latest official clickhouse 0.15.1 and upstream main require
    # polonius-the-crab 0.5.0 -> paste 1.0.15. Review on every refresh.
    "RUSTSEC-2024-0436",
]

[licenses]
confidence-threshold = 0.8
allow = ["Apache-2.0", "BSD-3-Clause", "BSL-1.0", "ISC", "MIT", "Unicode-3.0", "Zlib"]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = ["https://github.com/tailrocks/termrock.git"]
