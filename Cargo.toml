[workspace]
members = ["crates/tablerock-cli", "crates/tablerock-tui"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
license = "Apache-2.0"
repository = "https://github.com/tailrocks/tablerock"

[workspace.dependencies]
crossterm = { version = "0.29.0", features = ["event-stream"] }
futures-util = "0.3.32"
ratatui-core = "0.1.2"
ratatui-crossterm = { version = "0.1.2", default-features = false, features = ["crossterm_0_29"] }
termrock = { version = "=0.6.0", git = "https://github.com/tailrocks/termrock.git", rev = "9099b3db0c3318fd183d076c4e8f8002a877be6a" }
tokio = { version = "1.52.3", features = ["macros", "rt", "signal", "sync"] }

[workspace.lints.rust]
unsafe_code = "forbid"
rust_2018_idioms = { level = "deny", priority = -1 }

[workspace.lints.clippy]
correctness = "deny"
suspicious = "deny"
perf = "deny"
