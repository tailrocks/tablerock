[workspace]
members = ["crates/tablerock-cli", "crates/tablerock-core", "crates/tablerock-persistence", "crates/tablerock-tui"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
license = "Apache-2.0"
repository = "https://github.com/tailrocks/tablerock"

[workspace.dependencies]
crossterm = { version = "0.29.0", features = ["event-stream"] }
futures-util = "0.3.32"
ratatui-core = "0.1.2"
ratatui-crossterm = { version = "0.1.2", default-features = false, features = ["crossterm_0_29"] }
termrock = { version = "=0.9.0", git = "https://github.com/tailrocks/termrock.git", rev = "4bbb6de377574098c133e32a2f455bebac783c9b" }
tokio = { version = "1.52.3", features = ["macros", "rt", "signal", "sync", "time"] }
turso = { version = "=0.7.0", default-features = false }
zeroize = { version = "=1.9.0", default-features = false, features = ["alloc"] }

[workspace.lints.rust]
unsafe_code = "forbid"
rust_2018_idioms = { level = "deny", priority = -1 }

[workspace.lints.clippy]
correctness = "deny"
suspicious = "deny"
perf = "deny"
