name: Native Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "29 4 * * *"

permissions:
  contents: read

concurrency:
  # Must exactly match native.yml: both jobs use the same self-hosted workspace.
  group: native-macos-${{ github.ref }}
  cancel-in-progress: false

env:
  DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "26.0"
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "false"
  SCCACHE_CACHE_SIZE: 20G

jobs:
  nightly:
    name: Full native plan and performance
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: v0.16.0
          disable_annotations: "false"

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install_args: rust
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/registry/src
            ~/.cargo/git/db
          key: cargo-registry-GitHub-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-GitHub-${{ runner.os }}-
      - name: Cache Cargo target
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: target
          key: cargo-target-GitHub-${{ runner.os }}-${{ github.job }}-${{ hashFiles('rust-toolchain.toml', '.cargo/config.toml', '**/Cargo.toml', '**/Cargo.lock') }}-${{ github.sha }}
          restore-keys: cargo-target-GitHub-${{ runner.os }}-${{ github.job }}-${{ hashFiles('rust-toolchain.toml', '.cargo/config.toml', '**/Cargo.toml', '**/Cargo.lock') }}-
      - name: Record toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version
          rustc --version
          cargo --version

      - name: Install script prerequisites
        run: |
          brew update
          brew install ripgrep
          brew install --cask 1password-cli
          test "$(rg --version | head -n 1)" = "ripgrep 15.2.0"
          test "$(op --version)" = "2.35.0"
          op read --help | grep -F -- '--no-newline'
          op --help | grep -F -- '--account'

      - name: Build canonical project and universal bridge
        run: |
          mise install github:yonaskolb/XcodeGen@2.46.0
          mise exec github:yonaskolb/XcodeGen@2.46.0 -- \
            xcodegen generate --spec native/App/project.yml
          git diff --exit-code -- native/App/TableRock.xcodeproj native/App/TableRock-Info.plist
          cargo build -p tablerock-ffi --release --locked
          ./scripts/generate-swift-bindings.sh
          git diff --exit-code -- native/Generated native/Sources/TableRockBridge/tablerock_ffi.swift
          SKIP_BINDINGS=1 ./scripts/build-xcframework.sh

      - name: Run canonical Xcode nightly plan
        run: |
          mkdir -p artifacts
          set -o pipefail
          xcodebuild test \
            -project native/App/TableRock.xcodeproj \
            -scheme TableRock \
            -testPlan Nightly \
            -destination 'platform=macOS' \
            -resultBundlePath artifacts/TableRock-Nightly.xcresult \
            CODE_SIGN_IDENTITY=- \
            | tee artifacts/xcodebuild-nightly.log

      - name: Run named live Swift bridge tests
        run: |
          set -o pipefail
          ./scripts/verify-native-behavior.sh | tee artifacts/native-live-bridge.log

      - name: Archive and verify unsigned Release shape
        run: |
          set -o pipefail
          xcodebuild archive \
            -project native/App/TableRock.xcodeproj \
            -scheme TableRock \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath artifacts/TableRock.xcarchive \
            CODE_SIGN_IDENTITY=- \
            | tee artifacts/xcodebuild-archive.log
          app=artifacts/TableRock.xcarchive/Products/Applications/TableRock.app
          codesign --verify --deep --strict "$app"
          archs="$(lipo -archs "$app/Contents/MacOS/TableRock")"
          [[ "$archs" == "arm64 x86_64" || "$archs" == "x86_64 arm64" ]]
          ! otool -L "$app/Contents/MacOS/TableRock" | grep -E \
            '/target/|libtablerock_ffi[.]dylib'

      - name: Run accessibility and performance gates
        run: |
          ./scripts/verify-native-accessibility.sh
          ./scripts/verify-native-performance.sh artifacts/native-performance \
            | tee artifacts/native-performance.log
          test -s artifacts/native-performance/metrics.txt
          test -s artifacts/native-performance/scroll-toc.xml

      - name: Record canonical artifact metadata
        run: |
          ./scripts/record-native-artifact-metadata.sh \
            artifacts/TableRock.xcarchive \
            target/xcframework/tablerock_ffiFFI.xcframework \
            artifacts/native-metadata

      - name: Archive nightly evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-nightly-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            artifacts/TableRock-Nightly.xcresult
            artifacts/xcodebuild-nightly.log
            artifacts/native-live-bridge.log
            artifacts/TableRock.xcarchive
            artifacts/xcodebuild-archive.log
            artifacts/native-performance
            artifacts/native-performance.log
            artifacts/native-metadata
            ~/Library/Logs/DiagnosticReports/TableRock*.crash
            ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/Attachments
