name: Checks

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets
      - name: Check
        run: cargo check --workspace --all-targets
      - name: Container-free tests
        run: cargo test -p tablerock-core -p tablerock-persistence -p tablerock-tui -p tablerock-cli -p tablerock-ffi
      - name: Engine unit and container-free integration tests
        run: >
          cargo test -p tablerock-engine
          --lib
          --test engine_service
          --test driver_runtime
          --test session_registry
          --test adapter_contract

  real-servers:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - name: Real-server integration tests
        run: >
          cargo test -p tablerock-engine
          --test postgres_real
          --test clickhouse_real
          --test redis_real
          --test three_engine_overlap_real
      - name: UniFFI bridge real-server conformance
        run: cargo test -p tablerock-ffi --test bridge_real
      - name: CSV import apply through mutation seam
        run: cargo test -p tablerock-cli --test import_apply_real
      - name: Streaming re-query export
        run: cargo test -p tablerock-cli --test stream_export_real
      - name: First-row streaming performance budgets
        run: cargo test -p tablerock-engine --test performance_real -- --nocapture
      - name: Install PostgreSQL client tools
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: pg_dump/pg_restore real matrix
        run: cargo test -p tablerock-cli --test pg_dump_real -- --nocapture