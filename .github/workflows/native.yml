name: Native Checkpoint

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/native.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/tablerock-core/**"
      - "crates/tablerock-engine/**"
      - "crates/tablerock-ffi/**"
      - "crates/tablerock-files/**"
      - "crates/tablerock-persistence/**"
      - "native/**"
      - "scripts/build-native-app.sh"
      - "scripts/build-xcframework.sh"
      - "scripts/generate-swift-bindings.sh"
      - "scripts/record-native-artifact-metadata.sh"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Checkpoint and nightly share one self-hosted macOS workspace. Serialize
  # across both workflow files so Cargo/Xcode outputs cannot corrupt each other.
  group: native-macos-${{ github.ref }}
  cancel-in-progress: false

env:
  DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "26.0"
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "false"
  SCCACHE_CACHE_SIZE: 20G

jobs:
  native:
    name: Swift bridge, app, and XCFramework
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: v0.16.0
          disable_annotations: "false"

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install_args: rust
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/registry/src
            ~/.cargo/git/db
          key: cargo-registry-GitHub-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-GitHub-${{ runner.os }}-
      - name: Cache Cargo target
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: target
          key: cargo-target-GitHub-${{ runner.os }}-${{ github.job }}-${{ hashFiles('rust-toolchain.toml', '.cargo/config.toml', '**/Cargo.toml', '**/Cargo.lock') }}-${{ github.sha }}
          restore-keys: cargo-target-GitHub-${{ runner.os }}-${{ github.job }}-${{ hashFiles('rust-toolchain.toml', '.cargo/config.toml', '**/Cargo.toml', '**/Cargo.lock') }}-
      - name: Record toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version
          rustc --version
          cargo --version

      - name: Regenerate and reject Xcode project drift
        run: |
          mise install github:yonaskolb/XcodeGen@2.46.0
          mise exec github:yonaskolb/XcodeGen@2.46.0 -- \
            xcodegen generate --spec native/App/project.yml
          git diff --exit-code -- native/App/TableRock.xcodeproj native/App/TableRock-Info.plist

      - name: Build Rust bridge
        run: cargo build -p tablerock-ffi --release --locked

      - name: Regenerate and reject binding drift
        run: |
          ./scripts/generate-swift-bindings.sh
          git diff --exit-code -- native/Generated native/Sources/TableRockBridge/tablerock_ffi.swift

      - name: Run Swift bridge and feature tests
        env:
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/target/release
        run: swift test --package-path native -c release

      - name: Build universal static XCFramework
        run: SKIP_BINDINGS=1 ./scripts/build-xcframework.sh

      - name: Run canonical Xcode checkpoint plan
        run: |
          mkdir -p artifacts
          set -o pipefail
          xcodebuild test \
            -project native/App/TableRock.xcodeproj \
            -scheme TableRock \
            -testPlan Checkpoint \
            -destination 'platform=macOS' \
            -resultBundlePath artifacts/TableRock-Checkpoint.xcresult \
            CODE_SIGN_IDENTITY=- \
            | tee artifacts/xcodebuild-checkpoint.log

      - name: Archive and verify canonical Release app
        run: |
          set -o pipefail
          xcodebuild archive \
            -project native/App/TableRock.xcodeproj \
            -scheme TableRock \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath artifacts/TableRock.xcarchive \
            CODE_SIGN_IDENTITY=- \
            | tee artifacts/xcodebuild-archive.log
          app=artifacts/TableRock.xcarchive/Products/Applications/TableRock.app
          test -d "$app"
          codesign --verify --deep --strict "$app"
          test "$(plutil -extract CFBundleIdentifier raw "$app/Contents/Info.plist")" = \
            "app.tablerock.TableRock"
          archs="$(lipo -archs "$app/Contents/MacOS/TableRock")"
          [[ "$archs" == "arm64 x86_64" || "$archs" == "x86_64 arm64" ]]
          ! otool -L "$app/Contents/MacOS/TableRock" | grep -E \
            '/target/|libtablerock_ffi[.]dylib'
          test -z "$(find "$app" -name 'libtablerock_ffi*.dylib' -print -quit)"

      - name: Build and verify development app
        run: |
          ./scripts/build-native-app.sh
          codesign --verify --deep --strict native/dist/TableRock.app
          test "$(plutil -extract CFBundleIdentifier raw native/dist/TableRock.app/Contents/Info.plist)" = "app.tablerock.TableRock"
          test "$(lipo -archs target/xcframework/macos-universal/tablerock_ffiFFI.framework/tablerock_ffiFFI)" = "x86_64 arm64" \
            || test "$(lipo -archs target/xcframework/macos-universal/tablerock_ffiFFI.framework/tablerock_ffiFFI)" = "arm64 x86_64"

      - name: Record canonical artifact metadata
        run: |
          ./scripts/record-native-artifact-metadata.sh \
            artifacts/TableRock.xcarchive \
            target/xcframework/tablerock_ffiFFI.xcframework \
            artifacts/native-metadata

      - name: Archive structural artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-checkpoint-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            native/dist/TableRock.app
            target/xcframework/tablerock_ffiFFI.xcframework
            native/Generated
            native/App/TableRock.xcodeproj
            native/App/TestPlans
            artifacts/TableRock-Checkpoint.xcresult
            artifacts/xcodebuild-checkpoint.log
            artifacts/TableRock.xcarchive
            artifacts/xcodebuild-archive.log
            artifacts/native-metadata
            ~/Library/Logs/DiagnosticReports/TableRock*.crash
